name: Fetch Component Change Report

on:
  schedule:
    # 06:00 UTC on the 1st of every month — grabs the prior calendar month.
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      log_date:
        description: "Window start YYYY-MM-DD (blank = first of last month)"
        required: false
      log_date_secondary:
        description: "Window end (exclusive) YYYY-MM-DD (blank = first of this month)"
        required: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FLIGHTDOCS_USERNAME: ${{ secrets.FLIGHTDOCS_USERNAME || secrets.FLIGHTDOCS_USER || secrets.FD_USERNAME }}
      FLIGHTDOCS_PASSWORD: ${{ secrets.FLIGHTDOCS_PASSWORD || secrets.FLIGHTDOCS_PASS || secrets.FD_PASSWORD }}
      FD_LOG_DATE: ${{ inputs.log_date }}
      FD_LOG_DATE_SECONDARY: ${{ inputs.log_date_secondary }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Fetch component change report
        run: node scripts/fetch_component_changes.mjs

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ComponentChangeReport_109SP.csv
          if git diff --staged --quiet; then
            echo "No changes to the component change report."
            exit 0
          fi
          git commit -m "ci: refresh component change report"
          git pull --rebase origin "${{ github.ref_name }}" || true
          git push
