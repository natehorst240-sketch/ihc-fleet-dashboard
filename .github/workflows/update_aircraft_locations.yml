name: Update Aircraft Locations

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-locations:
    runs-on: ubuntu-latest
    env:
      TROOTRAX_USER: ${{ secrets.TROOTRAX_USER }}
      TROOTRAX_PASS: ${{ secrets.TROOTRAX_PASS }}
      TROOTRAX_CUSTOMER_ID: ${{ secrets.TROOTRAX_CUSTOMER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Pull latest Trootrax feed
        if: ${{ env.TROOTRAX_USER != '' && env.TROOTRAX_PASS != '' }}
        run: python scripts/trootrax.py

      - name: Commit updated location feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aircraft_locations.json
          git diff --staged --quiet || git commit -m "ci: refresh aircraft locations"
          git push
