name: Update Aircraft Locations

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-locations:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      TROOTRAX_USER: ${{ secrets.TROOTRAX_USER }}
      TROOTRAX_PASS: ${{ secrets.TROOTRAX_PASS }}
      TROOTRAX_CUSTOMER_ID: ${{ secrets.TROOTRAX_CUSTOMER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install Pillow requests

      - name: Pull latest Trootrax feed
        run: python scripts/trootrax.py


      - name: Rebuild dashboard with refreshed locations
        run: python scripts/fleet_dashboard_generator.py

      - name: Commit refreshed location feed and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aircraft_locations.json
          git add data/index.html data/flight_hours_history.json data/dashboard_version.json
          [ -f data/base_assignments.json ] && git add data/base_assignments.json
          git diff --staged --quiet || git commit -m "ci: refresh aircraft locations"
          git push
