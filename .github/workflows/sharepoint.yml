# .github/workflows/upload-to-sharepoint.yml
name: Upload Due List to SharePoint

on:
  push:
    branches: ["main"]
    paths:
      - "data/Due-List_BIG_WEEKLY_aw109sp.csv"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Convert CSV to JSON
        run: |
          node -e "
          const fs = require('fs');
          const csv = fs.readFileSync('data/Due-List_BIG_WEEKLY_aw109sp.csv', 'utf8');
          const lines = csv.split('\n').filter(l => l.trim());
          const headers = lines[0].split(',').map(h => h.trim().replace(/\"/g, ''));
          const rows = [];
          for (let i = 1; i < lines.length; i++) {
            const values = lines[i].match(/(\\".*?\\"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
            const row = {};
            headers.forEach((h, idx) => {
              row[h] = (values[idx] || '').replace(/^\"|\"$/g, '').trim();
            });
            rows.push(row);
          }
          fs.writeFileSync('data/due_list.json', JSON.stringify(rows));
          "

      - name: Email JSON to IHC
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: nathan.horstmeier@imail.org
          from: ${{ secrets.GMAIL_USER }}
          subject: "Due List Update"
          body: "Automated due list attached."
          attachments: data/due_list.json

      - name: Upload CSV to SharePoint
        uses: actions/github-script@v7
        env:
          TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
        with:
          script: |
            const fs = require('fs');

            const tokenRes = await fetch(
              `https://login.microsoftonline.com/${process.env.TENANT_ID}/oauth2/v2.0/token`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                  grant_type: 'client_credentials',
                  client_id: process.env.CLIENT_ID,
                  client_secret: process.env.CLIENT_SECRET,
                  scope: 'https://graph.microsoft.com/.default'
                })
              }
            );
            const tokenData = await tokenRes.json();
            if (!tokenData.access_token) throw new Error(`Token failed: ${JSON.stringify(tokenData)}`);
            const access_token = tokenData.access_token;

            const siteRes = await fetch(
              'https://graph.microsoft.com/v1.0/sites/workscalendar.sharepoint.com:/sites/MXConnectApp:',
              { headers: { Authorization: `Bearer ${access_token}` } }
            );
            const siteData = await siteRes.json();
            if (!siteData.id) throw new Error(`Site lookup failed: ${JSON.stringify(siteData)}`);

            const drivesRes = await fetch(
              `https://graph.microsoft.com/v1.0/sites/${siteData.id}/drives`,
              { headers: { Authorization: `Bearer ${access_token}` } }
            );
            const drivesData = await drivesRes.json();
            if (!drivesData.value) throw new Error(`Drives lookup failed: ${JSON.stringify(drivesData)}`);

            const drive = drivesData.value.find(d => d.name === 'MX DUE LIST');
            if (!drive) throw new Error(`Library not found. Available: ${drivesData.value.map(d => d.name).join(', ')}`);

            const csv = fs.readFileSync('data/Due-List_BIG_WEEKLY_aw109sp.csv');
            const uploadRes = await fetch(
              `https://graph.microsoft.com/v1.0/drives/${drive.id}/root:/Due-List_BIG_WEEKLY_aw109sp.csv:/content`,
              {
                method: 'PUT',
                headers: {
                  Authorization: `Bearer ${access_token}`,
                  'Content-Type': 'text/csv'
                },
                body: csv
              }
            );

            if (!uploadRes.ok) throw new Error(`Upload failed: ${uploadRes.status} ${await uploadRes.text()}`);
            console.log('Successfully uploaded to SharePoint');
