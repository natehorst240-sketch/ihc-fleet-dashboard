name: Fetch SkyRouter Positions

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium --with-deps

      - name: Run fetch script
        env:
          SKYROUTER_USER: ${{ secrets.SKYROUTER_USER }}
          SKYROUTER_PASS: ${{ secrets.SKYROUTER_PASS }}
        run: python scripts/fetch_positions_skyrouter.py || true  # don't fail build, we want debug artifacts committed

      - name: Commit updated base assignment artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull first with autostash so local writes don't block rebase
          git pull --rebase --autostash
          # Force-add both artifacts (-f required for .gitignore'd paths)
          git add -f data/base_assignments.json data/base_assignment_log.txt data/login_debug.png 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update base assignments $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
