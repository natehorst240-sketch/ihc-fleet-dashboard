name: Fetch ADS-B Positions

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        run: python scripts/fetch_positions.py

      - name: Commit updated base_assignments.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/base_assignments.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update base assignments $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
