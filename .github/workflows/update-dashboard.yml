name: Update Fleet Dashboard
on:
  push:
    branches: ["main"]
    paths:
      - "data/Due-List_BIG_WEEKLY_aw109sp.csv"
      - "data/base_assignments.json"
      - "build_dashboard.py"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dashboard-update
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: |
          mkdir -p public
          python build_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add public/index.html data/flight_hours_history.json || true
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update dashboard $(date -u) [skip ci]" && git push)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
