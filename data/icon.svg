<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="IHC Fleet Dashboard">
  <!-- Background tile -->
  <rect width="512" height="512" rx="96" fill="#0d1117"/>

  <!-- Rotor disc ring -->
  <circle cx="256" cy="240" r="172" fill="none" stroke="#1e3040" stroke-width="3"/>

  <!-- 4-blade rotor: two crossing rounded bars -->
  <rect x="96" y="218" width="320" height="44" rx="22" fill="#29b6f6"/>
  <rect x="234" y="80" width="44" height="320" rx="22" fill="#29b6f6"/>

  <!-- Hub: dark knockout + glowing center -->
  <circle cx="256" cy="240" r="34" fill="#0d1117"/>
  <circle cx="256" cy="240" r="20" fill="#29b6f6"/>

  <!-- Wordmark -->
  <text x="256" y="448" font-family="Arial,Helvetica,sans-serif" font-size="52"
        font-weight="700" letter-spacing="6" fill="#e8edf2" text-anchor="middle">IHC FLEET</text>
</svg>
