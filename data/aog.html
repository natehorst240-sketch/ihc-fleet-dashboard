<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IHC Fleet AOG Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;background:#08080f;">
  <div id="root"></div>

  <script>window.GOOGLE_CLIENT_ID = "920544975888-bdoe7s0s15jh99e72t7m1sj0vmk3fq53.apps.googleusercontent.com";</script>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const FLEET = ["N251HC","N261HC","N271HC","N281HC","N291HC","N431HC","N531HC","N631HC","N731HC"];

    const storage = window.storage || {
      async get(key) {
        const value = localStorage.getItem(key);
        return value == null ? null : { value };
      },
      async set(key, value) {
        localStorage.setItem(key, value);
      }
    };

    function dur(ms) {
      if (!ms || ms < 0) return "—";
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      if (h === 0 && m === 0) return "< 1m";
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    function durHours(ms) {
      if (!ms || ms < 0) return "0.0";
      return (ms / 3600000).toFixed(1);
    }

    function ts(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) +
        " " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
    }

    function escCsv(value) {
      const text = String(value ?? "");
      if (/[",\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
      return text;
    }

    function overlapMs(startMs, endMs, rangeStartMs, rangeEndMs) {
      const clippedStart = Math.max(startMs, rangeStartMs);
      const clippedEnd = Math.min(endMs, rangeEndMs);
      return Math.max(0, clippedEnd - clippedStart);
    }

    function App() {
      const [active, setActive] = useState([]);
      const [history, setHistory] = useState([]);
      const [tab, setTab] = useState("live");
      const [form, setForm] = useState({ tail: FLEET[0], desc: "", discId: "" });
      const [adding, setAdding] = useState(false);
      const [now, setNow] = useState(Date.now());
      const [loaded, setLoaded] = useState(false);
      const [clearing, setClearing] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const [syncLog, setSyncLog] = useState("");
      const [lastSync, setLastSync] = useState(null);
      const [locallyClearedIds, setLocallyClearedIds] = useState({});
      // Ref so interval callbacks always see the latest cleared IDs without stale closure.
      const locallyClearedRef = useRef({});

      useEffect(() => {
        locallyClearedRef.current = locallyClearedIds;
      }, [locallyClearedIds]);

      useEffect(() => {
        const i = setInterval(() => setNow(Date.now()), 15000);
        return () => clearInterval(i);
      }, []);

      useEffect(() => {
        async function load() {
          try {
            const [a, h, lc] = await Promise.all([
              storage.get("aog:active"),
              storage.get("aog:history"),
              storage.get("aog:locally_cleared_ids"),
            ]);
            if (a?.value) setActive(JSON.parse(a.value));
            if (h?.value) setHistory(JSON.parse(h.value));
            if (lc?.value) {
              const cleared = JSON.parse(lc.value);
              setLocallyClearedIds(cleared);
              locallyClearedRef.current = cleared;
            }
          } catch (e) {
            console.warn("AOG load failed", e);
          }
          setLoaded(true);
          // Fetch remote JSON immediately after localStorage is hydrated.
          fetchFromJson();
        }
        load();
      }, []);

      // Poll aog_status.json (kept current by Apps Script → GitHub) every 60s.
      useEffect(() => {
        const id = setInterval(fetchFromJson, 60 * 1000);
        return () => clearInterval(id);
      }, []);

      const save = useCallback(async (a, h) => {
        try {
          await storage.set("aog:active", JSON.stringify(a));
          await storage.set("aog:history", JSON.stringify(h));
        } catch (e) {
          console.warn("AOG save failed", e);
        }
      }, []);

      async function fetchFromJson() {
        try {
          const res = await fetch("./aog_status.json?t=" + Date.now());
          if (!res.ok) return;
          const data = await res.json();
          const cleared = locallyClearedRef.current;

          // Preserve manually-entered local events that aren't in the remote JSON.
          const localActiveRaw = await storage.get("aog:active");
          const localActive = localActiveRaw?.value ? JSON.parse(localActiveRaw.value) : [];
          const manualEvents = localActive.filter(e => e.source === "manual");

          const remoteActive = (data.active || []).filter(e => !cleared[e.id]);
          const merged = [...remoteActive];
          manualEvents.forEach(m => {
            if (!merged.find(e => e.id === m.id)) merged.push(m);
          });

          setActive(merged);
          if (data.lastUpdated) setLastSync(data.lastUpdated);
        } catch (e) {
          console.warn("Could not fetch aog_status.json:", e);
        }
      }

      async function syncEmails() {
        const apiKey = window.ANTHROPIC_API_KEY;
        if (!apiKey) {
          setSyncLog("Set window.ANTHROPIC_API_KEY to enable Gmail sync.");
          return;
        }

        setSyncing(true);
        setSyncLog("Checking Gmail for Veryon AOG emails...");
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: `You search Gmail for emails from Veryon Tracking Notifications with subject "New AOG Discrepancy Reported" received in the last 7 days.
For each email found, extract:
- Aircraft tail number (format like N251HC)
- Discrepancy description
- Discrepancy ID (the long number like 20260311161810)
- Date received (ISO format)
- Whether Aircraft Grounded = Yes

Respond ONLY with a JSON array of objects: [{tail, desc, discId, start, grounded}]
If no emails found, respond with [].
Do not include any explanation or markdown.`,
              messages: [{ role: "user", content: "Search Gmail for AOG emails from Veryon now." }],
              mcp_servers: [{ type: "url", url: "https://gmail.mcp.claude.com/mcp", name: "gmail" }]
            })
          });

          const data = await res.json();
          const textBlocks = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
          let parsed = [];
          try {
            const clean = textBlocks.replace(/```json|```/g, "").trim();
            parsed = JSON.parse(clean);
          } catch (e) {
            setSyncLog("Could not parse email data. Try manual entry.");
            setSyncing(false);
            return;
          }

          if (!parsed.length) {
            setSyncLog("No new AOG emails found in the last 7 days.");
            setSyncing(false);
            return;
          }

          let currentActive = [...active];
          const currentHistory = [...history];
          let added = 0;

          for (const email of parsed) {
            if (!email.tail || !email.grounded) continue;
            const alreadyActive = currentActive.find(a => a.discId === email.discId);
            const alreadyHistory = currentHistory.find(h => h.discId === email.discId);
            if (alreadyActive || alreadyHistory) continue;

            currentActive = [...currentActive, {
              id: `email-${email.discId || Date.now()}`,
              tail: email.tail,
              desc: email.desc,
              discId: email.discId,
              start: email.start,
              source: "email"
            }];
            added++;
          }

          setActive(currentActive);
          await save(currentActive, currentHistory);
          if (added > 0) {
            setSyncLog(`✓ Added ${added} new AOG event${added !== 1 ? "s" : ""} — publishing to repo…`);
            const ok = await publishToGitHub(currentActive, currentHistory);
            setSyncLog(ok ? `✓ Added ${added} event${added !== 1 ? "s" : ""} and pushed to repo.` : `✓ Added ${added} event${added !== 1 ? "s" : ""} (repo push failed — set GITHUB_PAT).`);
          } else {
            setSyncLog("No new AOG events to add.");
          }
        } catch (e) {
          setSyncLog("Gmail sync error: " + e.message);
        }
        setSyncing(false);
      }

      async function pushToRepo() {
        setSyncing(true);
        setSyncLog("Publishing to repo…");
        const ok = await publishToGitHub(active, history);
        setSyncLog(ok ? "✓ aog_status.json updated in repo." : "Push failed — check window.GITHUB_PAT.");
        setSyncing(false);
      }

      async function publishToGitHub(activeList, historyList) {
        const pat = window.GITHUB_PAT;
        if (!pat) {
          setSyncLog("Set window.GITHUB_PAT to enable repo publishing.");
          return false;
        }
        const REPO = "natehorst240-sketch/ihc-fleet-dashboard";
        const PATH = "data/aog_status.json";
        const API  = `https://api.github.com/repos/${REPO}/contents/${PATH}`;

        const payload = {
          active:      activeList,
          history:     historyList,
          lastUpdated: new Date().toISOString(),
        };
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));

        // Get current SHA so GitHub accepts the update.
        let sha;
        try {
          const r = await fetch(API, { headers: { Authorization: `Bearer ${pat}`, Accept: "application/vnd.github+json" } });
          if (r.ok) sha = (await r.json()).sha;
        } catch (_) {}

        const body = { message: "ci: update aog_status.json via browser sync", content, branch: "main" };
        if (sha) body.sha = sha;

        const res = await fetch(API, {
          method: "PUT",
          headers: { Authorization: `Bearer ${pat}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        return res.ok;
      }

      function addAOG() {
        if (!form.desc.trim()) return;
        const entry = {
          id: Date.now().toString(),
          tail: form.tail,
          desc: form.desc,
          discId: form.discId,
          start: new Date().toISOString(),
          source: "manual"
        };
        const na = [...active, entry];
        setActive(na);
        save(na, history);
        setAdding(false);
        setForm({ tail: FLEET[0], desc: "", discId: "" });
      }

      function clearAOG(id) {
        const item = active.find(a => a.id === id);
        if (!item) return;
        const resolved = {
          ...item,
          end: new Date().toISOString(),
          duration: Date.now() - new Date(item.start).getTime()
        };
        const na = active.filter(a => a.id !== id);
        const nh = [resolved, ...history];
        setActive(na);
        setHistory(nh);
        save(na, nh);
        // Track email-sourced events that were manually cleared so they don't
        // reappear from aog_status.json on the next poll.
        if (item.source === "email") {
          const newCleared = { ...locallyClearedRef.current, [id]: true };
          setLocallyClearedIds(newCleared);
          locallyClearedRef.current = newCleared;
          storage.set("aog:locally_cleared_ids", JSON.stringify(newCleared));
        }
        setClearing(null);
      }

      const weekEnd = Date.now();
      const weekAgo = weekEnd - 7 * 86400000;
      const weekEvents = history
        .map(h => {
          const eventStartMs = new Date(h.start).getTime();
          const eventEndMs = new Date(h.end).getTime();
          return {
            ...h,
            weekDurationMs: overlapMs(eventStartMs, eventEndMs, weekAgo, weekEnd)
          };
        })
        .filter(h => h.weekDurationMs > 0);
      const totalWeekMs = 7 * 24 * 3600000;
      const byTail = FLEET.map(t => {
        const events = weekEvents.filter(e => e.tail === t);
        const totalMs = events.reduce((s, e) => s + (e.weekDurationMs || 0), 0);
        const availability = Math.max(0, ((totalWeekMs - totalMs) / totalWeekMs) * 100);
        return {
          tail: t,
          count: events.length,
          totalMs,
          events,
          totalHours: totalMs / 3600000,
          availability,
          topReason: events[0]?.desc || "",
          over24Count: events.filter(e => (e.weekDurationMs || 0) >= 24 * 3600000).length
        };
      });

      const byTailWithEvents = byTail.filter(x => x.count > 0);
      const avgAvailability = byTail.length
        ? byTail.reduce((sum, x) => sum + x.availability, 0) / byTail.length
        : 100;

      function downloadWeeklyCsv() {
        const rangeLabel = `${new Date(weekAgo).toLocaleDateString('en-US')} - ${new Date(weekEnd).toLocaleDateString('en-US')}`;
        const rows = [
          ["IHC FLEET WEEKLY OOS REPORT", rangeLabel],
          [],
          ["Tail", "AOG Events", "OOS Hours", "Events >24h", "Top OOS Reason", "Operational Availability %"]
        ];

        byTail.forEach(row => {
          rows.push([
            row.tail,
            row.count,
            durHours(row.totalMs),
            row.over24Count,
            row.topReason,
            `${row.availability.toFixed(1)}%`
          ]);
        });

        rows.push([]);
        rows.push(["Fleet Avg Operational Availability", `${avgAvailability.toFixed(1)}%`]);

        const csv = rows.map(r => r.map(escCsv).join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `weekly-oos-report-${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
      }

      const inp = {
        background: "#050509", border: "1px solid #1a1a2e", color: "#c8c8d8",
        padding: "9px 12px", borderRadius: 2, fontFamily: "'Courier New',monospace",
        fontSize: 12, width: "100%", boxSizing: "border-box", outline: "none"
      };
      const btn = (col, bg) => ({
        background: bg || "transparent", border: `1px solid ${col}`, color: col,
        padding: "7px 14px", borderRadius: 2, cursor: "pointer",
        fontFamily: "'Courier New',monospace", fontSize: 10, letterSpacing: 2
      });

      if (!loaded) return (
        <div style={{ background: "#08080f", color: "#333", height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "monospace", fontSize: 11, letterSpacing: 4 }}>
          LOADING...
        </div>
      );

      return (
        <div style={{ background: "#08080f", minHeight: "100vh", color: "#d0d0e0", fontFamily: "'Courier New',monospace" }}>
          <div style={{ background: "#09090f", borderBottom: "1px solid #111125", padding: "13px 20px", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: active.length ? "#ff2222" : "#22cc55", boxShadow: active.length ? "0 0 10px #ff2222" : "0 0 10px #22cc55", animation: active.length ? "pulse 1.4s infinite" : "none" }} />
            <span style={{ fontSize: 10, letterSpacing: 4, color: "#3a3a5a" }}>IHC FLEET · AOG TRACKER</span>
            <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 10 }}>
              {lastSync && (
                <span style={{ fontSize: 9, color: "#4a5a6a", letterSpacing: 1 }}>
                  LAST EMAIL SYNC: {ts(lastSync)}
                </span>
              )}
              {syncLog && <span style={{ fontSize: 9, color: "#444466", maxWidth: 260, textAlign: "right" }}>{syncLog}</span>}
              <button onClick={syncEmails} disabled={syncing} style={btn("#3355aa", "#05050f")}>
                {syncing ? "SYNCING..." : "⟳ SYNC GMAIL"}
              </button>
              <button onClick={pushToRepo} disabled={syncing} style={btn("#224422", "#05050f")} title="Requires window.GITHUB_PAT">
                PUSH TO REPO
              </button>
              <span style={{ fontSize: 10, letterSpacing: 2, color: active.length ? "#ff4444" : "#33aa55" }}>
                {active.length ? `${active.length} AOG` : "ALL CLEAR"}
              </span>
            </div>
          </div>

          {active.length > 0 && (
            <div style={{ padding: "14px 20px 0" }}>
              {active.map(a => (
                <div key={a.id} style={{ background: "linear-gradient(135deg,#120000,#0a0005)", border: "1px solid #3d0000", borderLeft: "3px solid #ff2222", borderRadius: 2, padding: "12px 14px", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                    <div style={{ minWidth: 86 }}>
                      <div style={{ fontSize: 21, fontWeight: "bold", color: "#ff3333", letterSpacing: 3, lineHeight: 1 }}>{a.tail}</div>
                      <div style={{ fontSize: 8, color: "#660000", letterSpacing: 3, marginTop: 3 }}>AOG</div>
                      {a.source === "email" && <div style={{ fontSize: 8, color: "#333366", letterSpacing: 1, marginTop: 2 }}>via email</div>}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 12, color: "#ffbbbb", marginBottom: 5 }}>{a.desc}</div>
                      {a.discId && <div style={{ fontSize: 9, color: "#442222", letterSpacing: 1 }}>DISCREPANCY {a.discId}</div>}
                    </div>
                    <div style={{ textAlign: "right", minWidth: 130 }}>
                      <div style={{ fontSize: 8, color: "#442222", letterSpacing: 2, marginBottom: 3 }}>GROUNDED SINCE</div>
                      <div style={{ fontSize: 10, color: "#aa4444" }}>{ts(a.start)}</div>
                      <div style={{ fontSize: 16, color: "#ff5555", fontWeight: "bold", marginTop: 5 }}>{dur(now - new Date(a.start).getTime())}</div>
                    </div>
                  </div>
                  <div style={{ marginTop: 10, borderTop: "1px solid #1a0000", paddingTop: 10, display: "flex", gap: 8, justifyContent: "flex-end" }}>
                    {clearing === a.id ? (
                      <>
                        <span style={{ fontSize: 10, color: "#666", alignSelf: "center" }}>Confirm aircraft returned to service?</span>
                        <button onClick={() => clearAOG(a.id)} style={btn("#44cc44", "#001a00")}>✓ CONFIRM CLEAR</button>
                        <button onClick={() => setClearing(null)} style={btn("#333")}>CANCEL</button>
                      </>
                    ) : (
                      <button onClick={() => setClearing(a.id)} style={btn("#44cc44", "#001500")}>CLEAR AOG</button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}

          <div style={{ padding: "14px 20px 0", display: "flex", gap: 2, borderBottom: "1px solid #0e0e1e" }}>
            {[['live', `LIVE (${active.length})`], ['history', 'HISTORY'], ['weekly', 'WEEKLY REPORT']].map(([k, label]) => (
              <button key={k} onClick={() => setTab(k)} style={{ background: "transparent", border: "none", borderBottom: tab === k ? "2px solid #ff3333" : "2px solid transparent", color: tab === k ? "#cc3333" : "#2a2a44", padding: "7px 14px 9px", cursor: "pointer", fontFamily: "'Courier New',monospace", fontSize: 10, letterSpacing: 2 }}>
                {label}
              </button>
            ))}
            <div style={{ flex: 1 }} />
            <button onClick={() => setAdding(v => !v)} style={{ ...btn("#ff3333", "#0d0000"), marginBottom: 8 }}>
              {adding ? "CANCEL" : "+ MANUAL AOG"}
            </button>
          </div>

          <div style={{ padding: "14px 20px" }}>
            {adding && (
              <div style={{ background: "#090912", border: "1px solid #1a1a2e", borderRadius: 2, padding: 14, marginBottom: 14 }}>
                <div style={{ fontSize: 9, letterSpacing: 4, color: "#333355", marginBottom: 10 }}>MANUAL AOG ENTRY</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                  <div>
                    <div style={{ fontSize: 9, color: "#333355", letterSpacing: 2, marginBottom: 4 }}>TAIL</div>
                    <select value={form.tail} onChange={e => setForm({ ...form, tail: e.target.value })} style={{ ...inp, appearance: "none" }}>
                      {FLEET.map(t => <option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{ fontSize: 9, color: "#333355", letterSpacing: 2, marginBottom: 4 }}>DISCREPANCY ID</div>
                    <input placeholder="20260311161810" value={form.discId} onChange={e => setForm({ ...form, discId: e.target.value })} style={inp} />
                  </div>
                </div>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 9, color: "#333355", letterSpacing: 2, marginBottom: 4 }}>DESCRIPTION</div>
                  <input placeholder="Broken roller on left sliding door" value={form.desc} onChange={e => setForm({ ...form, desc: e.target.value })} style={inp} onKeyDown={e => e.key === 'Enter' && addAOG()} />
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end" }}>
                  <button onClick={addAOG} disabled={!form.desc.trim()} style={{ ...btn("#ff3333", "#150000"), opacity: form.desc.trim() ? 1 : 0.4 }}>
                    CONFIRM AOG
                  </button>
                </div>
              </div>
            )}

            {tab === 'live' && !active.length && !adding && (
              <div style={{ textAlign: "center", padding: "60px 0", color: "#1a1a2a", fontSize: 11, letterSpacing: 4 }}>
                <div style={{ fontSize: 30, marginBottom: 10, color: "#1a331a" }}>✓</div>
                NO ACTIVE AOG EVENTS
                <div style={{ marginTop: 8, fontSize: 9, color: "#111122" }}>Use SYNC GMAIL to check for new Veryon notifications</div>
              </div>
            )}

            {tab === 'history' && (
              <div>
                {!history.length && <div style={{ textAlign: "center", padding: "60px 0", color: "#1a1a2a", fontSize: 11, letterSpacing: 4 }}>NO HISTORY YET</div>}
                {history.map(h => (
                  <div key={h.id} style={{ border: "1px solid #111122", borderRadius: 2, padding: "10px 12px", marginBottom: 6, display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ minWidth: 76, fontSize: 14, fontWeight: "bold", color: "#44405a", letterSpacing: 2 }}>{h.tail}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 11, color: "#3a3a55" }}>{h.desc}</div>
                      {h.discId && <div style={{ fontSize: 9, color: "#222233", marginTop: 2 }}>#{h.discId}</div>}
                    </div>
                    <div style={{ textAlign: "right", fontSize: 10 }}>
                      <div style={{ color: "#2a2a44" }}>{ts(h.start)}</div>
                      <div style={{ color: "#2a2a44" }}>→ {ts(h.end)}</div>
                      <div style={{ color: "#44aa55", fontWeight: "bold", marginTop: 3, fontSize: 11 }}>↓ {dur(h.duration)}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab === 'weekly' && (
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                  <div style={{ fontSize: 12, letterSpacing: 2, color: "#8a9ad4" }}>
                    7-DAY OUT OF SERVICE REPORT · {new Date(weekAgo).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – {new Date(weekEnd).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
                  </div>
                  <button onClick={downloadWeeklyCsv} style={{ ...btn("#88aaff", "#050514"), marginLeft: "auto" }}>
                    ⭳ EXPORT CSV
                  </button>
                </div>

                <div style={{ overflowX: "auto", border: "1px solid #151528", marginBottom: 12 }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 720 }}>
                    <thead>
                      <tr style={{ background: "#0b0b16" }}>
                        {["Tail", "AOG Events", "OOS Hours", "Events >24h", "Top OOS Reason", "Operational Availability"].map(h => (
                          <th key={h} style={{ border: "1px solid #1c1c2d", color: "#bcc7ff", fontSize: 12, letterSpacing: 1, textAlign: "left", padding: "9px 10px" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {byTail.map((x, idx) => (
                        <tr key={x.tail} style={{ background: idx % 2 ? "#090912" : "#07070f" }}>
                          <td style={{ border: "1px solid #1a1a2a", color: "#d0d6ff", fontSize: 12, fontWeight: "bold", letterSpacing: 1, padding: "9px 10px" }}>{x.tail}</td>
                          <td style={{ border: "1px solid #1a1a2a", color: "#99a6db", fontSize: 12, padding: "9px 10px" }}>{x.count}</td>
                          <td style={{ border: "1px solid #1a1a2a", color: "#ffbf66", fontSize: 12, padding: "9px 10px" }}>{durHours(x.totalMs)}</td>
                          <td style={{ border: "1px solid #1a1a2a", color: "#ddaad5", fontSize: 12, padding: "9px 10px" }}>{x.over24Count}</td>
                          <td style={{ border: "1px solid #1a1a2a", color: "#a7aed1", fontSize: 12, padding: "9px 10px" }}>{x.topReason || "—"}</td>
                          <td style={{ border: "1px solid #1a1a2a", color: x.availability >= 95 ? "#8cffb0" : "#ffc36e", fontSize: 12, fontWeight: "bold", padding: "9px 10px" }}>{x.availability.toFixed(1)}%</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div style={{ fontSize: 12, color: "#90a1d8", marginBottom: 8 }}>
                  Fleet avg operational availability: <span style={{ color: "#8eb5ff", fontWeight: "bold" }}>{avgAvailability.toFixed(1)}%</span>
                </div>

                {!byTailWithEvents.length && <div style={{ textAlign: "center", padding: "20px 0 60px", color: "#4d5786", fontSize: 13, letterSpacing: 3 }}>NO AOG EVENTS THIS WEEK</div>}
                {byTailWithEvents.map(x => (
                  <div key={x.tail} style={{ background: "#090912", border: "1px solid #111122", borderRadius: 2, padding: "12px 14px", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                      <span style={{ fontSize: 20, fontWeight: "bold", color: "#909cf2", letterSpacing: 2 }}>{x.tail}</span>
                      <span style={{ fontSize: 11, color: "#7c88d0", letterSpacing: 2 }}>{x.count} EVENT{x.count !== 1 ? "S" : ""}</span>
                      <span style={{ marginLeft: "auto", fontSize: 16, color: "#ffc571", fontWeight: "bold" }}>
                        {dur(x.totalMs)} DOWN
                      </span>
                    </div>
                    {x.events.map(e => (
                      <div key={e.id} style={{ fontSize: 12, color: "#8a95cf", borderTop: "1px solid #0e0e1e", padding: "8px 0" }}>
                        <div style={{ display: "flex", gap: 6 }}>
                          <span>{ts(e.start)}</span>
                          <span style={{ color: "#5f6699" }}>→</span>
                          <span>{ts(e.end)}</span>
                          <span style={{ marginLeft: "auto", color: "#66e389", fontWeight: "bold" }}>{dur(e.weekDurationMs)} this week</span>
                        </div>
                        {e.desc && <div style={{ fontSize: 11, color: "#7985bf", marginTop: 4, fontStyle: "italic" }}>{e.desc}</div>}
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            )}
          </div>
          <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}} button:hover{opacity:0.8} input:focus,select:focus{border-color:#2a2a5a!important;}`}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
